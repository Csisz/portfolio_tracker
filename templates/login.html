<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés – Portfólió Követő</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border: 1px solid #e8e8e0;
      border-radius: 14px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-logo {
      text-align: center;
      font-size: 36px;
      margin-bottom: 8px;
    }
    .login-title {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #222;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #1a1a2e; }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #2d2d50; }
    .error-box {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #991b1b;
      margin-bottom: 20px;
    }
    .login-hint {
      margin-top: 20px;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">📈</div>
    <div class="login-title">Portfólió Követő</div>
    <div class="login-sub">Zoltán befektetési nyilvántartója</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="username">Felhasználónév</label>
        <input type="text" id="username" name="username" class="form-input"
               placeholder="admin" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Jelszó</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Belépés</button>
    </form>

    <div class="login-hint">Fejlesztésben: admin / admin</div>
  </div>
</body>
</html>
