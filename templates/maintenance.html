<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Karbantartás</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; padding: 40px 48px; text-align: center; max-width: 420px; }
    h1 { font-size: 40px; margin-bottom: 8px; }
    h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 12px; }
    p { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🔧</h1>
    <h2>Karbantartás folyamatban</h2>
    <p>Az alkalmazás ideiglenesen nem elérhető. Kérlek, próbáld újra hamarosan.</p>
  </div>
</body>
</html>
