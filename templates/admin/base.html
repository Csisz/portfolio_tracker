<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} – Portfólió Követő</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f0; color: #222; font-size: 14px; }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .page-title { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 20px; }
    .page-title span { font-size: 14px; font-weight: 400; color: #888; margin-left: 10px; }

    .card { background: #fff; border: 1px solid #e8e8e0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 12px; color: #888; font-weight: 500; padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; background: #fafaf7; }
    tbody td { padding: 11px 14px; border-bottom: 1px solid #f0f0e8; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafaf7; }

    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
    .badge-admin { background: #dbeafe; color: #1e40af; }
    .badge-user { background: #f3f4f6; color: #374151; }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-warn { background: #fffbeb; color: #92400e; }
    .badge-error { background: #fee2e2; color: #991b1b; }

    .btn { display: inline-block; padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; border: none; transition: all 0.15s; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #2d2d50; }
    .btn-secondary { background: #f9fafb; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 5px; }
    .form-input { width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 14px; outline: none; }
    .form-input:focus { border-color: #1a1a2e; }
    .form-select { width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 14px; outline: none; background: #fff; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }

    .alert { padding: 11px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-card { background: #fff; border: 1px solid #e8e8e0; border-radius: 9px; padding: 16px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    .status-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #f0f0e8; }
    .status-row:last-child { border-bottom: none; }
    .status-key { font-size: 13px; color: #555; }
    .status-val { font-size: 13px; }

    .text-muted { color: #9ca3af; font-size: 12px; }
    .mt-0 { margin-top: 0; }
  </style>
</head>
<body>

{% include "partials/navbar.html" %}

<div class="admin-body">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
